{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "rws.fullname" . }}
  labels:
    {{- include "rws.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "rws.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.customMetric.enabled }}
    # Requires the Prometheus Adapter or KEDA — see
    # docs/deployment/kubernetes.md#horizontalpodautoscaler.
    - type: External
      external:
        metric:
          name: {{ .Values.autoscaling.customMetric.name }}
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.customMetric.averageValue | quote }}
    {{- end }}
{{- end }}
